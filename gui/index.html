<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Debate Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">AI Debate Platform</p>
        <h1 id="debate-title">Loading debate...</h1>
      </div>
      <form id="debate-form" class="panel">
        <label>Topic<input name="topic" placeholder="Is AI a threat?"></label>
        <div class="grid">
          <label>Debater A<input name="stance_a" placeholder="AI is a significant threat"></label>
          <label>Debater B<input name="stance_b" placeholder="AI is not a threat"></label>
        </div>
        <div class="grid">
          <label>Debater A Provider
            <select name="provider_a">
              <option value="zai">Z.ai</option>
              <option value="groq">Groq</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="mock">Mock</option>
            </select>
          </label>
          <label>Debater B Provider
            <select name="provider_b">
              <option value="groq">Groq</option>
              <option value="zai">Z.ai</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="mock">Mock</option>
            </select>
          </label>
        </div>
        <p class="judge-note">Judge: Groq (fixed)</p>
        <label>Rounds<input name="rounds" type="number" min="1" max="10" value="10"></label>
        <details style="margin-top:0.5rem;">
          <summary style="cursor:pointer;font-size:0.9rem;font-weight:600;">RAG (Knowledge Base)</summary>
          <div class="grid" style="margin-top:0.5rem;">
            <label style="flex-direction:row;align-items:center;gap:0.4rem;">
              <input type="checkbox" name="use_rag" value="true"> Enable RAG
            </label>
            <label style="flex-direction:row;align-items:center;gap:0.4rem;">
              <input type="checkbox" name="rebuild_index" value="true"> Rebuild index
            </label>
          </div>
          <label style="margin-top:0.25rem;">Top-K passages
            <input name="top_k" type="number" min="1" max="10" value="3">
          </label>
        </details>
        <button id="run-button" type="submit">Run Debate</button>
      </form>
    </section>

    <section class="layout">
      <aside class="verdict">
        <p class="eyebrow">Judge Verdict</p>
        <p id="verdict-text">No verdict loaded yet.</p>
        <details id="token-details" style="margin-top:1rem;font-size:0.85rem;" hidden>
          <summary style="cursor:pointer;font-weight:600;">Token Usage</summary>
          <dl id="token-stats" style="margin-top:0.5rem;display:grid;grid-template-columns:auto 1fr;gap:0.2rem 0.75rem;"></dl>
        </details>
      </aside>
      <section class="transcript" aria-label="Debate transcript">
        <div class="section-head">
          <h2>Transcript</h2>
          <span id="message-count">0 messages</span>
        </div>
        <div id="messages" class="messages"></div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
