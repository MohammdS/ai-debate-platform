<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Debate Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Debate Platform</p>
        <h1 id="debate-title">AI Debate Platform</h1>
      </div>
      <label class="theme-switch" for="theme-toggle">
        <input id="theme-toggle" type="checkbox" aria-label="Toggle night mode">
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span>Night mode</span>
      </label>
    </header>

    <section class="hero">
      <form id="debate-form" class="panel">
        <div class="panel-head">
          <h2>Debate Setup</h2>
          <span id="judge-note">Judge model from setup.json</span>
        </div>
        <label>Topic<input name="topic" placeholder="Is AI a threat?"></label>
        <div class="grid">
          <label>Debater A<input name="stance_a" placeholder="AI is a significant threat"></label>
          <label>Debater B<input name="stance_b" placeholder="AI is not a threat"></label>
        </div>
        <div class="grid">
          <label>Debater A Provider
            <select name="provider_a">
              <option value="zai">Z.ai</option>
              <option value="groq">Groq</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="mock">Mock</option>
            </select>
          </label>
          <label>Debater B Provider
            <select name="provider_b">
              <option value="groq">Groq</option>
              <option value="zai">Z.ai</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="mock">Mock</option>
            </select>
          </label>
          <label>Judge Provider
            <select name="judge_provider">
              <option value="groq">Groq</option>
              <option value="zai">Z.ai</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="mock">Mock</option>
            </select>
          </label>
        </div>
        <label>Rounds<input name="rounds" type="number" min="1" max="10" value="10"></label>
        <button id="run-button" type="submit">Run Debate</button>
      </form>
    </section>

    <section class="layout">
      <aside class="verdict">
        <p class="eyebrow">Judge's Verdict</p>
        <p id="verdict-topic" class="topic-line">Topic will appear here after a debate starts.</p>
        <h2 id="judge-model">Judge model pending</h2>
        <p id="verdict-text">No verdict loaded yet.</p>
      </aside>
      <section class="transcript" aria-label="Debate transcript">
        <div class="section-head">
          <div>
            <h2>Live Transcript</h2>
            <p id="transcript-topic" class="topic-line">Topic will appear here after a debate starts.</p>
            <div id="model-summary" class="model-summary"></div>
          </div>
          <span id="message-count">0 messages</span>
        </div>
        <div id="messages" class="messages"></div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
