<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Debate Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1 id="debate-title">AI Debate Platform</h1>
      </div>
      <label class="theme-switch" for="theme-toggle">
        <input id="theme-toggle" type="checkbox" aria-label="Toggle night mode">
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span>Night mode</span>
      </label>
    </header>

    <section class="hero">
      <form id="debate-form" class="panel" novalidate>
        <div class="panel-head">
          <h2>Debate Setup</h2>
          <span id="judge-note">Judge model from setup.json</span>
        </div>
        <div class="field topic-field">
          <label for="topic">Topic</label>
          <input id="topic" name="topic" required placeholder="Is AI a threat?">
        </div>
        <div class="field rounds-field">
          <label for="rounds">Rounds <span class="field-help">(max 10)</span></label>
          <input id="rounds" name="rounds" type="number" min="1" max="10" value="10" required aria-describedby="rounds-help">
          <span id="rounds-help" class="sr-only">Maximum 10 rounds.</span>
        </div>
        <div class="field">
          <label for="stance-a">Debater A Stance</label>
          <input id="stance-a" name="stance_a" required placeholder="AI is a significant threat">
        </div>
        <div class="field">
          <label for="stance-b">Debater B Stance</label>
          <input id="stance-b" name="stance_b" required placeholder="AI is not a threat">
        </div>
        <div class="field">
          <label for="provider-a">Debater A Provider</label>
          <select id="provider-a" name="provider_a" required>
            <option value="zai">Z.ai</option>
            <option value="groq">Groq</option>
            <option value="openrouter">OpenRouter</option>
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="mock">Mock</option>
          </select>
        </div>
        <div class="field">
          <label for="provider-b">Debater B Provider</label>
          <select id="provider-b" name="provider_b" required>
            <option value="groq">Groq</option>
            <option value="zai">Z.ai</option>
            <option value="openrouter">OpenRouter</option>
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="mock">Mock</option>
          </select>
        </div>
        <div class="field">
          <label for="judge-provider">Judge Provider</label>
          <select id="judge-provider" name="judge_provider" required>
            <option value="groq">Groq</option>
            <option value="zai">Z.ai</option>
            <option value="openrouter">OpenRouter</option>
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="mock">Mock</option>
          </select>
        </div>
        <p id="form-status" class="form-status" role="alert" aria-live="polite"></p>
        <button id="run-button" type="submit">Run Debate</button>
      </form>
    </section>

    <section class="layout">
      <aside class="verdict">
        <p class="eyebrow">Judge's Verdict</p>
        <p id="verdict-topic" class="topic-line">Topic will appear here after a debate starts.</p>
        <h2 id="judge-model">Judge model pending</h2>
        <p id="verdict-text">No verdict loaded yet.</p>
        <details id="token-details" style="margin-top:1rem;font-size:0.85rem;" hidden>
          <summary style="cursor:pointer;font-weight:600;">Token Usage</summary>
          <dl id="token-stats" style="margin-top:0.5rem;display:grid;grid-template-columns:auto 1fr;gap:0.2rem 0.75rem;"></dl>
        </details>
      </aside>
      <section class="transcript" aria-label="Debate transcript">
        <div class="section-head">
          <div>
            <h2>Live Transcript</h2>
            <p id="transcript-topic" class="topic-line">Topic will appear here after a debate starts.</p>
            <div id="model-summary" class="model-summary"></div>
          </div>
          <span id="message-count">0 messages</span>
        </div>
        <div id="messages" class="messages"></div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
